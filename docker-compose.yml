services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: casino
      POSTGRES_USER: casino
      POSTGRES_PASSWORD: casino
    ports:
      - "127.0.0.1:5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    ports:
      - "127.0.0.1:6379:6379"
    command: redis-server --save 60 1 --appendonly yes --appendfsync everysec --loglevel warning
    volumes:
      - redis_data:/data

volumes:
  postgres_data:
  redis_data:
